<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27 NUTS · 双桌</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0c0c0c;
      background-image:
        repeating-linear-gradient(45deg,  rgba(255,255,255,0.01) 0 1px, transparent 1px 6px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.01) 0 1px, transparent 1px 6px);
      font-family: 'Oswald', 'Arial Black', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶栏 ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 28px 10px;
      border-bottom: 1px solid rgba(201,149,58,0.25);
      flex-shrink: 0;
    }
    .brand {
      color: #c9953a;
      font-size: clamp(20px, 2.8vw, 38px);
      font-weight: 700;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(201,149,58,0.6);
    }
    .topbar-right { display:flex; gap:8px; }
    .tv-btn, .cfg-btn {
      background: none;
      border: 1px solid rgba(201,149,58,0.3);
      border-radius: 8px;
      color: rgba(201,149,58,0.5);
      cursor: pointer;
      font-size: 20px;
      padding: 6px 10px;
      transition: all .2s;
    }
    .tv-btn:hover, .cfg-btn:hover { color:#c9953a; border-color:#c9953a; }
    body.tv-mode .controls-area { display:none !important; }
    body.tv-mode .bottombar     { display:none; }
    body.tv-mode .tv-btn        { opacity:.15; }
    body.tv-mode .tv-btn:hover  { opacity:1; }
    body.tv-mode .cup-float     { bottom: 24px; }

    /* ── 两桌主体 ── */
    .tables {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    .table-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 20px 8px;
      gap: 6px;
    }
    .table-panel.panel-a {
      border-right: 1px solid rgba(201,149,58,0.2);
    }

    .table-name {
      color: #c9953a;
      font-size: clamp(20px, 2.8vw, 38px);
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      outline: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
      cursor: text;
      text-align: center;
    }
    .table-name:focus { border-bottom-color: #c9953a; }

    .level-info {
      color: rgba(201,149,58,0.6);
      font-size: clamp(11px, 1.2vw, 16px);
      letter-spacing: 2px;
    }
    .progress-wrap {
      width: 160px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg,#7a5010,#c9953a,#ffd97a);
      transition: width 1s linear;
    }

    .timer-digits {
      font-size: clamp(60px, 11vw, 140px);
      font-weight: 700;
      color: #f5f0e8;
      font-family: 'Courier New', monospace;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 0 40px rgba(245,240,232,0.2);
      transition: color 0.3s;
    }
    .timer-digits.warning {
      color: #e05a3a;
      text-shadow: 0 0 30px rgba(224,90,58,0.8);
      animation: blink .55s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .blind-now {
      color: rgba(255,255,255,0.88);
      font-size: clamp(22px, 4vw, 56px);
      font-weight: 700;
      letter-spacing: 2px;
    }

    .next-wrap { display:flex; flex-direction:column; align-items:center; gap:1px; }
    .next-label {
      color: #c9953a;
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .next-value {
      color: rgba(245,240,232,0.4);
      font-size: clamp(14px, 2.2vw, 30px);
      font-weight: 600;
    }

    .cups-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }
    .cups-label {
      color: #c9953a;
      font-size: clamp(13px, 1.5vw, 20px);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .cups-number {
      color: #f5f0e8;
      font-size: clamp(40px, 7vw, 90px);
      font-weight: 700;
      line-height: 1;
      min-width: 60px;
      text-align: center;
    }
    .btn-cup-add {
      background: linear-gradient(135deg,#a07018,#c9953a);
      color: #0c0c0c; font-size: clamp(18px,2.2vw,26px);
      padding: 4px 12px; border-radius: 8px; font-weight:900;
      border:none; cursor:pointer; transition: transform .12s;
    }
    .btn-cup-sub {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.55);
      font-size: clamp(18px,2.2vw,26px);
      padding: 4px 12px; border-radius: 8px; font-weight:900;
      cursor:pointer; transition: transform .12s;
    }
    .btn-cup-add:hover, .btn-cup-sub:hover { transform:scale(1.08); }

    /* 浮动杯数面板 */
    .cup-float {
      position: fixed;
      bottom: 72px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 50;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(201,149,58,0.3);
      border-radius: 12px;
      padding: 8px 14px;
    }
    .cup-float-a { left: 28px; }
    .cup-float-b { right: 28px; }
    .cup-float-label {
      color: #c9953a;
      font-size: clamp(11px, 1.2vw, 15px);
      letter-spacing: 2px;
    }
    .cup-float-num {
      color: #f5f0e8;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      line-height: 1;
    }

    /* ── 底栏 ── */
    .bottombar {
      border-top: 1px solid rgba(201,149,58,0.2);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 8px 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .controls-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .controls-area.right { justify-content: flex-end; }

    .btn {
      padding: 8px 16px;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(11px, 1.2vw, 15px);
      font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: transform .12s, filter .12s;
      white-space: nowrap;
    }
    .btn:hover  { transform:scale(1.06); filter:brightness(1.15); }
    .btn:active { transform:scale(0.95); }
    .btn-start  { background:linear-gradient(135deg,#2d6a30,#3d9142); color:#fff; }
    .btn-pause  { background:linear-gradient(135deg,#7a3d10,#c96820); color:#fff; }
    .btn-reset  { background:linear-gradient(135deg,#6a1515,#a02020); color:#fff; }

    .settings-inline {
      display:flex; align-items:center; gap:6px;
    }
    .settings-label { color:rgba(201,149,58,0.5); font-size:11px; letter-spacing:1px; text-transform:uppercase; }
    .settings-input {
      background:rgba(0,0,0,0.4); border:1px solid rgba(201,149,58,0.3);
      color:#c9953a; padding:5px 6px; border-radius:6px; width:46px;
      text-align:center; font-size:13px; font-family:'Oswald',sans-serif; font-weight:bold;
    }
    .settings-input:focus { outline:none; border-color:#c9953a; }

    .sync-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .btn-sync {
      background: rgba(201,149,58,0.12);
      border: 1px solid rgba(201,149,58,0.35);
      border-radius: 8px;
      color: #c9953a;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 600;
      letter-spacing: 1px;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .btn-sync:hover { background: rgba(201,149,58,0.25); }

    .chips-strip {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    .chip-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .chip-wrap svg {
      width: clamp(36px, 5vw, 58px);
      height: clamp(36px, 5vw, 58px);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6));
    }
    .chip-label {
      color: rgba(255,255,255,0.5);
      font-size: clamp(9px, 1vw, 12px);
      letter-spacing: 1px;
    }

    /* ── 结束遮罩 ── */
    .fin-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85);
      display:none; align-items:center; justify-content:center;
      flex-direction:column; gap:20px; z-index:100;
    }
    .fin-overlay.show { display:flex; }
    .fin-text { color:#c9953a; font-size:clamp(36px,6vw,72px); font-weight:700; letter-spacing:6px; text-shadow:0 0 40px rgba(201,149,58,0.8); }

    /* ── 涨盲动画 ── */
    .level-flash {
      position:fixed; top:0; bottom:0; z-index:200;
      width:50%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      background:rgba(0,0,0,0.82);
      pointer-events:none; opacity:0;
    }
    .level-flash.side-a { left:0; }
    .level-flash.side-b { right:0; }
    .level-flash.show { animation:flashAnim 3.2s ease forwards; }
    @keyframes flashAnim { 0%{opacity:0} 12%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
    .lf-tag    { color:#c9953a; font-size:clamp(16px,2vw,28px); letter-spacing:6px; text-transform:uppercase; }
    .lf-blinds { color:#f5f0e8; font-size:clamp(50px,10vw,120px); font-weight:700; letter-spacing:2px; text-shadow:0 0 60px rgba(201,149,58,0.9); animation:scaleIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both; animation-delay:0.15s; }
    .lf-level  { color:rgba(201,149,58,0.7); font-size:clamp(13px,1.6vw,20px); letter-spacing:4px; }
    .lf-bar    { width:clamp(140px,18vw,240px); height:3px; background:linear-gradient(90deg,transparent,#c9953a,transparent); border-radius:2px; }
    @keyframes scaleIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }

    /* ── 密码 ── */
    #pw-overlay { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; }
    #pw-overlay.hidden { display:none; }
    .pw-box { background:linear-gradient(160deg,#1c1c1c,#141414); border:1px solid rgba(201,149,58,0.4); border-radius:14px; padding:32px 28px 24px; display:flex; flex-direction:column; align-items:center; gap:16px; min-width:260px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.7); }
    .pw-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:14px 14px 0 0; background:linear-gradient(90deg,transparent,#c9953a,transparent); }
    .pw-title { color:#c9953a; font-size:15px; letter-spacing:3px; text-transform:uppercase; }
    .pw-input { background:rgba(0,0,0,0.4); border:1px solid rgba(201,149,58,0.3); border-radius:8px; color:#f5f0e8; font-family:'Oswald',sans-serif; font-size:22px; letter-spacing:6px; text-align:center; padding:10px 16px; width:100%; outline:none; transition:border-color .2s; }
    .pw-input:focus { border-color:#c9953a; }
    .pw-error { color:#e05a3a; font-size:12px; letter-spacing:2px; height:16px; text-transform:uppercase; }
    .pw-error.shake { animation:pwshake .35s ease; }
    @keyframes pwshake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .pw-btn { background:linear-gradient(135deg,#a07018,#c9953a); border:none; border-radius:8px; color:#0c0c0c; font-family:'Oswald',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; padding:10px 32px; cursor:pointer; }

    /* ── 配置弹窗 ── */
    #cfg-overlay { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; }
    #cfg-overlay.hidden { display:none; }
    .cfg-box { background:linear-gradient(160deg,#1c1c1c,#141414); border:1px solid rgba(201,149,58,0.4); border-radius:14px; padding:28px 28px 22px; min-width:300px; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.7); position:relative; }
    .cfg-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:14px 14px 0 0; background:linear-gradient(90deg,transparent,#c9953a,transparent); }
    .cfg-title { color:#c9953a; font-size:14px; letter-spacing:3px; text-transform:uppercase; margin-bottom:18px; text-align:center; }
    .cfg-levels { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; max-height:320px; overflow-y:auto; padding-right:4px; margin-bottom:18px; }
    .cfg-levels::-webkit-scrollbar { width:4px; }
    .cfg-levels::-webkit-scrollbar-thumb { background:rgba(201,149,58,0.4); border-radius:2px; }
    .cfg-level-item { display:flex; align-items:center; gap:8px; cursor:pointer; padding:5px 8px; border-radius:6px; transition:background .15s; }
    .cfg-level-item:hover { background:rgba(201,149,58,0.08); }
    .cfg-level-item input[type=checkbox] { accent-color:#c9953a; width:15px; height:15px; cursor:pointer; }
    .cfg-level-text { color:rgba(245,240,232,0.75); font-size:13px; font-family:'Oswald',sans-serif; }
    .cfg-actions { display:flex; gap:10px; justify-content:flex-end; align-items:center; }
    .cfg-select-all { color:rgba(201,149,58,0.5); font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; flex:1; background:none; border:none; font-family:'Oswald',sans-serif; text-align:left; padding:0; }
    .cfg-select-all:hover { color:#c9953a; }
    .cfg-cancel { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:rgba(255,255,255,0.45); font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:1.5px; padding:8px 18px; cursor:pointer; }
    .cfg-confirm { background:linear-gradient(135deg,#a07018,#c9953a); border:none; border-radius:8px; color:#0c0c0c; font-family:'Oswald',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; padding:8px 22px; cursor:pointer; }
  </style>
</head>
<body>

<!-- 配置弹窗 -->
<div id="cfg-overlay" class="hidden">
  <div class="cfg-box">
    <div class="cfg-title">选择启用的级别</div>
    <div class="cfg-levels" id="cfg-levels"></div>
    <div class="cfg-actions">
      <button class="cfg-select-all" onclick="cfgToggleAll()">全选 / 全不选</button>
      <button class="cfg-cancel" onclick="closeCfg()">取消</button>
      <button class="cfg-confirm" onclick="applyCfg()">确认</button>
    </div>
  </div>
</div>

<!-- 密码 -->
<div id="pw-overlay">
  <div class="pw-box">
    <div class="pw-title">请输入密码</div>
    <input class="pw-input" id="pw-input" type="password" maxlength="10" placeholder="··"
      autofocus onkeydown="if(event.key==='Enter')pwSubmit()">
    <div class="pw-error" id="pw-error"></div>
    <button class="pw-btn" onclick="pwSubmit()">确认</button>
  </div>
</div>

<!-- 结束遮罩 -->
<div class="fin-overlay" id="fin">
  <div class="fin-text">GAME OVER</div>
  <button class="btn btn-reset" onclick="resetAll()">重新开始</button>
</div>

<!-- 涨盲动画 -->
<div class="level-flash" id="level-flash">
  <div class="lf-tag">盲注上涨</div>
  <div class="lf-bar"></div>
  <div class="lf-blinds" id="lf-blinds">—</div>
  <div class="lf-level"  id="lf-level">LEVEL 2</div>
</div>

<!-- 顶栏 -->
<div class="topbar">
  <div class="brand">27 NUTS · BAR</div>
  <div class="topbar-right">
    <button class="cfg-btn" onclick="openCfg()" title="配置级别">⚙️</button>
    <button class="tv-btn"  onclick="toggleTV()" title="TV模式">📺</button>
  </div>
</div>

<!-- 两桌 -->
<div class="tables">

  <!-- A桌 -->
  <div class="table-panel panel-a">
    <span class="table-name" contenteditable="true" spellcheck="false"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">A 桌</span>
    <div class="level-info" id="a-level">LEVEL 1 / 25</div>
    <div class="progress-wrap"><div class="progress-fill" id="a-prog" style="width:100%"></div></div>
    <div class="timer-digits" id="a-timer">6:00</div>
    <div class="blind-now" id="a-blind">100 / 200</div>
    <div class="next-wrap">
      <div class="next-label">下一级别</div>
      <div class="next-value" id="a-next">200 / 400</div>
    </div>
  </div>

  <!-- B桌 -->
  <div class="table-panel panel-b">
    <span class="table-name" contenteditable="true" spellcheck="false"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">B 桌</span>
    <div class="level-info" id="b-level">LEVEL 1 / 25</div>
    <div class="progress-wrap"><div class="progress-fill" id="b-prog" style="width:100%"></div></div>
    <div class="timer-digits" id="b-timer">6:00</div>
    <div class="blind-now" id="b-blind">100 / 200</div>
    <div class="next-wrap">
      <div class="next-label">下一级别</div>
      <div class="next-value" id="b-next">200 / 400</div>
    </div>
  </div>

</div>

<!-- 左下浮动：A桌杯数 -->
<div class="cup-float cup-float-a">
  <span class="cup-float-label">A桌</span>
  <button class="btn-cup-sub" onclick="changeCup('a',-1)">−</button>
  <span class="cup-float-num" id="a-cups">0</span>
  <button class="btn-cup-add" onclick="changeCup('a',1)">+</button>
</div>

<!-- 右下浮动：B桌杯数 -->
<div class="cup-float cup-float-b">
  <span class="cup-float-label">B桌</span>
  <button class="btn-cup-sub" onclick="changeCup('b',-1)">−</button>
  <span class="cup-float-num" id="b-cups">0</span>
  <button class="btn-cup-add" onclick="changeCup('b',1)">+</button>
</div>

<!-- 底栏 -->
<div class="bottombar">

  <!-- A桌控制 -->
  <div class="controls-area">
    <button class="btn btn-start" onclick="startT('a')">▶ A开始</button>
    <button class="btn btn-pause" onclick="pauseT('a')">⏸ 暂停</button>
    <button class="btn btn-reset" onclick="resetT('a')">↺ 重置</button>
    <div class="settings-inline">
      <span class="settings-label">每级</span>
      <input class="settings-input" type="number" id="dur" value="6" min="1" max="120" onchange="setDuration()">
      <span class="settings-label">分</span>
    </div>
  </div>

  <!-- 中间：筹码 -->
  <div class="sync-center controls-area">
    <div class="chips-strip" id="chips-strip"></div>
  </div>

  <!-- B桌控制 -->
  <div class="controls-area right">
    <button class="btn btn-start" onclick="startT('b')">▶ B开始</button>
    <button class="btn btn-pause" onclick="pauseT('b')">⏸ 暂停</button>
    <button class="btn btn-reset" onclick="resetT('b')">↺ 重置</button>
  </div>

</div>

<script>
  // ── 密码 ──
  function pwSubmit() {
    if (document.getElementById('pw-input').value === '27') {
      document.getElementById('pw-overlay').classList.add('hidden');
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = '密码错误';
      err.classList.remove('shake'); void err.offsetWidth; err.classList.add('shake');
      document.getElementById('pw-input').value = '';
    }
  }

  // ── 筹码 SVG ──
  function chipSVG(bg, ring, band, val) {
    const id = 'c' + val;
    return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="ta${id}" d="M18,58 A42,42 0 0,1 102,58"/>
        <path id="tb${id}" d="M20,64 A42,42 0 0,0 100,64"/>
      </defs>
      <ellipse cx="60" cy="65" rx="50" ry="7" fill="rgba(0,0,0,0.4)"/>
      <circle cx="60" cy="58" r="56" fill="${ring}"/>
      <circle cx="60" cy="58" r="50" fill="${bg}"/>
      <circle cx="60" cy="58" r="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <rect x="10" y="49" width="100" height="19" fill="${band}" rx="1.5"/>
      <text x="16" y="64" font-family="Arial Black,sans-serif" font-size="27" font-weight="900" fill="white">27</text>
      <text x="57" y="63" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="white">NUTS</text>
      <text font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.8)" font-weight="bold" letter-spacing="1.8">
        <textPath href="#ta${id}" startOffset="8%">27NUTS · BAR</textPath>
      </text>
      <text font-family="Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.65)" font-weight="bold" letter-spacing="1.8">
        <textPath href="#tb${id}" startOffset="8%">27NUTS · BAR</textPath>
      </text>
    </svg>`;
  }

  const CHIPS = [
    { bg:'#2e2e2e', ring:'#585858', band:'#1a1a1a', label:'100'  },
    { bg:'#cc1020', ring:'#880010', band:'#880010', label:'500'  },
    { bg:'#f07820', ring:'#b84e08', band:'#c05a10', label:'1000' },
    { bg:'#5848b8', ring:'#362898', band:'#362898', label:'5000' },
  ];
  const strip = document.getElementById('chips-strip');
  CHIPS.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'chip-wrap';
    wrap.innerHTML = chipSVG(c.bg, c.ring, c.band, c.label) + `<div class="chip-label">${c.label}</div>`;
    strip.appendChild(wrap);
  });

  // ── 盲注级别 ──
  const BLINDS_ALL = [
    100,200,300,400,500,600,700,800,900,1000,
    1500,2000,3000,4000,5000,6000,7000,8000,9000,10000,
    15000,20000,30000,40000,50000
  ].map(sb => ({ sb, bb: sb*2 }));

  const activeFlags = BLINDS_ALL.map(() => true);
  let BLINDS = [...BLINDS_ALL];

  // ── 双桌状态 ──
  const T = {
    a: { level:0, timeLeft:360, duration:360, running:false, iv:null, warned:false, cups:0 },
    b: { level:0, timeLeft:360, duration:360, running:false, iv:null, warned:false, cups:0 },
  };

  function fmt(sec) {
    return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
  }

  function renderT(id) {
    const s = T[id];
    const b  = BLINDS[s.level];
    const nb = s.level < BLINDS.length-1 ? BLINDS[s.level+1] : null;
    const el = document.getElementById(`${id}-timer`);
    el.textContent = fmt(s.timeLeft);
    el.className = 'timer-digits' + (s.timeLeft <= 30 && s.running ? ' warning' : '');
    document.getElementById(`${id}-prog`).style.width = (s.timeLeft / s.duration * 100) + '%';
    document.getElementById(`${id}-blind`).textContent = `${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}`;
    document.getElementById(`${id}-next`).textContent  = nb
      ? `${nb.sb.toLocaleString()} / ${nb.bb.toLocaleString()}` : '最终级别';
    document.getElementById(`${id}-level`).textContent = `LEVEL ${s.level+1} / ${BLINDS.length}`;
    document.getElementById(`${id}-cups`).textContent  = s.cups;
  }

  function tick(id) {
    const s = T[id];
    if (s.timeLeft > 0) {
      s.timeLeft--;
      if (s.timeLeft === 60) s.warned = true;
    } else if (s.level < BLINDS.length-1) {
      s.level++; s.timeLeft = s.duration; s.warned = false;
      playLevelUp(); showLevelFlash(id);
    } else {
      clearInterval(s.iv); s.running = false;
      document.getElementById('fin').classList.add('show');
    }
    renderT(id);
  }

  function startT(id) {
    const s = T[id];
    if (s.running) return;
    s.running = true; s.iv = setInterval(() => tick(id), 1000);
  }
  function pauseT(id) {
    const s = T[id];
    if (!s.running) return;
    clearInterval(s.iv); s.running = false;
  }
  function resetT(id) {
    const s = T[id];
    clearInterval(s.iv); s.running = false;
    s.level = 0; s.timeLeft = s.duration; s.warned = false; s.cups = 0;
    document.getElementById('fin').classList.remove('show');
    renderT(id);
  }
  function resetAll() { resetT('a'); resetT('b'); }

  function changeCup(id, d) {
    T[id].cups = Math.max(0, T[id].cups + d);
    document.getElementById(`${id}-cups`).textContent = T[id].cups;
  }

  function setDuration() {
    const v = parseInt(document.getElementById('dur').value, 10);
    if (!v || v < 1) return;
    ['a','b'].forEach(id => {
      T[id].duration = v * 60;
      if (!T[id].running) { T[id].timeLeft = v * 60; renderT(id); }
    });
  }

  // 级别同步：把B桌同步到A桌当前级别和时间
  function syncLevels() {
    pauseT('b');
    T.b.level    = T.a.level;
    T.b.timeLeft = T.a.timeLeft;
    T.b.warned   = T.a.warned;
    renderT('b');
  }

  // 杯数合计弹窗
  function syncCups() {
    const total = T.a.cups + T.b.cups;
    alert(`A桌 ${T.a.cups} 杯  +  B桌 ${T.b.cups} 杯  =  总计 ${total} 杯`);
  }

  function toggleTV() { document.body.classList.toggle('tv-mode'); }

  // ── 音效 ──
  function playTone(freq, startTime, duration, ctx, gainVal=0.25) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(freq, startTime);
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(gainVal, startTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, startTime+duration);
    o.start(startTime); o.stop(startTime+duration);
  }
  function playWarning() {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [0,0.28,0.56].forEach((t,i) => playTone(880+i*110, ctx.currentTime+t, 0.22, ctx, 0.22));
    } catch(e){}
  }
  function playLevelUp() {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [[523,0],[659,0.18],[784,0.36],[1047,0.58]].forEach(([f,t]) => playTone(f, ctx.currentTime+t, 0.55, ctx, 0.28));
    } catch(e){}
  }

  // ── 涨盲动画 ──
  function showLevelFlash(id) {
    const b = BLINDS[T[id].level];
    document.getElementById('lf-blinds').textContent = `${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}`;
    document.getElementById('lf-level').textContent  = `LEVEL ${T[id].level+1}`;
    const el = document.getElementById('level-flash');
    el.classList.remove('show', 'side-a', 'side-b');
    void el.offsetWidth;
    el.classList.add('show', id === 'a' ? 'side-a' : 'side-b');
  }

  // ── 配置模块 ──
  function buildCfgList() {
    const container = document.getElementById('cfg-levels');
    container.innerHTML = '';
    BLINDS_ALL.forEach((b, i) => {
      const label = document.createElement('label');
      label.className = 'cfg-level-item';
      label.innerHTML = `<input type="checkbox" id="cfg-cb-${i}" ${activeFlags[i]?'checked':''}>
        <span class="cfg-level-text">Lv${i+1} &nbsp; ${b.sb.toLocaleString()} / ${b.bb.toLocaleString()}</span>`;
      container.appendChild(label);
    });
  }
  function openCfg()  { buildCfgList(); document.getElementById('cfg-overlay').classList.remove('hidden'); }
  function closeCfg() { document.getElementById('cfg-overlay').classList.add('hidden'); }
  function cfgToggleAll() {
    const cbs = document.querySelectorAll('#cfg-levels input[type=checkbox]');
    const any = [...cbs].some(cb => cb.checked);
    cbs.forEach(cb => cb.checked = !any);
  }
  function applyCfg() {
    const cbs = document.querySelectorAll('#cfg-levels input[type=checkbox]');
    let hasAny = false;
    cbs.forEach((cb,i) => { activeFlags[i] = cb.checked; if(cb.checked) hasAny=true; });
    if (!hasAny) activeFlags[0] = true;
    BLINDS = BLINDS_ALL.filter((_,i) => activeFlags[i]);
    closeCfg();
    ['a','b'].forEach(id => {
      if (!T[id].running) { T[id].level=0; T[id].timeLeft=T[id].duration; renderT(id); }
      else if (T[id].level >= BLINDS.length) { T[id].level = BLINDS.length-1; renderT(id); }
    });
  }

  renderT('a'); renderT('b');
</script>
</body>
</html>
